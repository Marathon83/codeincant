# ScriptForge AI — Nginx config
# Replace yourdomain.com with your actual domain.
# Certbot will auto-update the ssl_certificate paths when you run:
#   certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # --- TLS (filled in by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # --- Frontend (static files) ---
    root /opt/scriptforge/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Backend API (SSE-safe proxy) ---
    location ~ ^/(generate|debug|analyze|convert|improve|simulate|cheatsheet|tutor|sandbox|security|workflow|health) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required for SSE — disable all buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # --- Larger body limit for screenshot uploads ---
    client_max_body_size 10m;
}
